name: Maintenance

on:
  push:
    branches: [main]

jobs:
  maintenance:
    runs-on: ubuntu-latest

    env:
      TRAINING_FEATURES_DIR: data/sample/training_features

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download training features from S3
        run: |
          mkdir -p data/sample/training_features
          aws s3 cp s3://fraud-ml-rohan-12345/ci/training_features_sample/ data/sample/training_features/ --recursive

      - name: Download production artifacts from S3
        run: |
          mkdir -p artifacts
          aws s3 cp s3://fraud-ml-rohan-12345/production_artifacts/current/model.pkl artifacts/model.pkl
          aws s3 cp s3://fraud-ml-rohan-12345/production_artifacts/current/feature_columns.json artifacts/feature_columns.json
          aws s3 cp s3://fraud-ml-rohan-12345/production_artifacts/current/threshold.json artifacts/threshold.json
          aws s3 cp s3://fraud-ml-rohan-12345/production_artifacts/current/backfill_scored.parquet artifacts/backfill_scored.parquet

      - name: Run maintenance orchestrator
        run: |
          bash scripts/run_maintenance.sh

      - name: Show maintenance outputs
        if: always()
        run: |
          echo "===== drift_report.csv ====="
          cat data/monitoring/drift_report.csv || true
          echo
          echo "===== backfill_metrics.csv ====="
          cat data/monitoring/backfill_metrics.csv || true
          echo
          echo "===== model_comparison.csv ====="
          cat data/monitoring/model_comparison.csv || true
          echo
          echo "===== model_recommendation.csv ====="
          cat data/monitoring/model_recommendation.csv || true

      - name: Upload maintenance outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maintenance-results
          path: |
            artifacts/
            data/monitoring/
