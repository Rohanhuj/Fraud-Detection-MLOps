name: Retrain and Compare

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  retrain:
    runs-on: ubuntu-latest

    env:
      TRAINING_FEATURES_DIR: data/sample/training_features

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download training data from S3
        run: |
          mkdir -p data/sample/training_features
          aws s3 cp s3://fraud-ml-rohan-12345/ci/training_features_sample/ data/sample/training_features/ --recursive

    
      - name: Download production artifacts from S3
        run: |
          mkdir -p artifacts
          aws s3 cp s3://fraud-ml-rohan-12345/production_artifacts/current/model.pkl artifacts/model.pkl
          aws s3 cp s3://fraud-ml-rohan-12345/production_artifacts/current/feature_columns.json artifacts/feature_columns.json
          aws s3 cp s3://fraud-ml-rohan-12345/production_artifacts/current/threshold.json artifacts/threshold.json
          aws s3 cp s3://fraud-ml-rohan-12345/production_artifacts/current/backfill_scored.parquet artifacts/backfill_scored.parquet
            
      - name: Run retrain and compare
        run: |
          python src/retraining/retrain_and_compare.

      - name: Build Docker image
        run: |
          docker build -t fraud-scoring-service .
          
      - name: Show comparison outputs
        if: always()
        run: |
          echo "===== model_comparison.csv ====="
          cat data/monitoring/model_comparison.csv || true
          echo
          echo "===== model_recommendation.csv ====="
          cat data/monitoring/model_recommendation.csv || true

      - name: Promote candidate if approved
        if: false
        run: |
          bash scripts/promote_candidate.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retrain-results
          path: |
            artifacts/
            data/monitoring/