name: Retrain and Compare Fraud Model

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/retraining/**"
      - "src/monitoring/**"
      - "src/train_baseline.py"
      - "requirements*.txt"
      - ".github/workflows/retrain-and-compare.yml"

jobs:
  retrain-and-compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements-serving.txt
          pip install pandas numpy scikit-learn xgboost mlflow pyarrow fastapi uvicorn requests

      - name: Ensure output directories exist
        run: |
          mkdir -p data/monitoring
          mkdir -p artifacts
          mkdir -p src/retraining

      - name: Run retrain and compare workflow
        run: |
          python src/retraining/retrain_and_compare.py

      - name: Upload monitoring artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fraud-monitoring-artifacts
          path: |
            data/monitoring/model_comparison.csv
            data/monitoring/model_recommendation.csv
            artifacts/backfill_scored_candidate.parquet
            artifacts/candidate_model.pkl
          if-no-files-found: warn